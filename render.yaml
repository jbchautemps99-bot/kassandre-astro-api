services:
  - type: web
    name: kassandre-api
    runtime: node
    region: frankfurt
    plan: starter
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20"
      - key: KASSANDRE_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
